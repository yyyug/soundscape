name: iOS Unsigned Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: apps/ios

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            apps/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.bundle
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/ios/Podfile.lock', 'apps/ios/Podfile', 'apps/ios/Gemfile.lock', 'apps/ios/patches/**/*.diff') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Pods
        run: bundle exec pod install

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: |
            apps/ios/build/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/ios/GuideDogs.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -workspace GuideDogs.xcworkspace \
            -scheme Soundscape \
            -resolvePackageDependencies \
            -derivedDataPath build

      - name: Build Unsigned iPhone App
        run: |
          ANH_ROOT="$PWD/build/SourcePackages/checkouts/azure-notificationhubs-ios/WindowsAzureMessaging/WindowsAzureMessaging"
          ANH_INCLUDE="$ANH_ROOT/Internal"
          test -f "$ANH_INCLUDE/ANHAsync.h"
          test -f "$ANH_ROOT/SBTemplateRegistration.h"

          xcodebuild \
            -workspace GuideDogs.xcworkspace \
            -scheme Soundscape \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            OTHER_CFLAGS="-I$ANH_ROOT -I$ANH_INCLUDE" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package Unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Soundscape.app"
          test -d "$APP_PATH"
          rm -rf Payload Soundscape-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Soundscape.app
          ditto -c -k --sequesterRsrc --keepParent Payload Soundscape-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Soundscape-unsigned-ipa
          path: apps/ios/Soundscape-unsigned.ipa
