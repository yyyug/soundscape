name: iOS Unsigned Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: apps/ios

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Install Pods
        run: pod install

      - name: Build Unsigned iPhone App
        run: |
          xcodebuild \
            -workspace GuideDogs.xcworkspace \
            -scheme Soundscape \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package Unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/Soundscape.app"
          test -d "$APP_PATH"
          rm -rf Payload Soundscape-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Soundscape.app
          ditto -c -k --sequesterRsrc --keepParent Payload Soundscape-unsigned.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Soundscape-unsigned-ipa
          path: apps/ios/Soundscape-unsigned.ipa
